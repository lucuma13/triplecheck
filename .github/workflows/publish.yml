---
name: Publish to PyPI
run-name: Publish to PyPI - Release ${{ github.ref_name }}
"on":
  release:
    types: [published]
concurrency:
  group: pypi-publish
  cancel-in-progress: true
permissions: {} # deny all by default; each job grants only what it needs
jobs:
  # JOB 0: Run the full CI suite as a safety gate
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
  # JOB 1: Read project metadata from pyproject.toml
  read-metadata:
    name: Read pyproject.toml metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package-name: ${{ steps.meta.outputs.package-name }}
      smoke-test-cmds: ${{ steps.meta.outputs.smoke-test-cmds }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Extract metadata from pyproject.toml
        id: meta
        shell: python3 {0}
        run: |
          import tomllib, os

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          project = data["project"]
          name = project["name"]
          version = project["version"]
          cmds = " ".join(project.get("scripts", {}).keys())

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              print(f"package-name={name}", file=out)
              print(f"smoke-test-cmds={cmds}", file=out)
              print(f"version={version}", file=out)
  # JOB 2: Verify tag, build and publish (only runs if CI passes)
  build-n-publish:
    name: Build and publish Python distro to PyPI
    needs: [ci, read-metadata]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC trusted publishing
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.read-metadata.outputs.package-name }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Verify release tag matches declared version
        env:
          DECLARED_VERSION: ${{ needs.read-metadata.outputs.version }}
        shell: python3 {0}
        run: |
          import os, sys

          tag = os.environ["GITHUB_REF_NAME"]
          version = os.environ["DECLARED_VERSION"]
          if tag != version:
              print(f"Version mismatch: tag={tag}, declared={version}")
              sys.exit(1)
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false # disabled to prevent cache poisoning
          ignore-empty-workdir: true
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: pyproject.toml
      - name: Build binary wheels and source tarball
        run: uv build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 1
      - name: Publish to PyPI via uv
        run: uv publish
  # JOB 3: Post-deployment smoke test (verifies index installation and packaging)
  verify-deployment:
    name: Verify Live Package (${{ matrix.os }})
    needs: [read-metadata, build-n-publish]
    runs-on: ${{ matrix.os }}
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false # disabled on publish workflows to prevent cache poisoning
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Install deployed package from PyPI
        env:
          PACKAGE_NAME: ${{ needs.read-metadata.outputs.package-name }}
          VERSION: ${{ needs.read-metadata.outputs.version }}
        shell: bash
        run: |
          MAX_RETRIES=10
          RETRY_INTERVAL=15

          for i in $(seq 1 $MAX_RETRIES); do
            # --refresh-package bypasses uv's cached index listing so each retry
            # re-fetches from PyPI and can see the freshly published version.
            if uv pip install --system --refresh-package "$PACKAGE_NAME" "$PACKAGE_NAME==$VERSION"; then
              echo "Package installed successfully from PyPI."
              exit 0
            fi
            echo "Index not yet updated. Retrying in $RETRY_INTERVAL seconds... ($i/$MAX_RETRIES)"
            sleep $RETRY_INTERVAL
          done

          echo "Package failed to propagate after $((MAX_RETRIES * RETRY_INTERVAL)) seconds."
          exit 1
      - name: Smoke test CLI entry points
        env:
          SMOKE_TEST_CMDS: ${{ needs.read-metadata.outputs.smoke-test-cmds }}
        shell: bash
        run: |
          for cmd in $SMOKE_TEST_CMDS; do
            echo "→ $cmd --version"
            "$cmd" --version
          done
